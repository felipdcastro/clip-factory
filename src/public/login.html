<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Factory — Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">✂️</div>
    <h1>Clip Factory</h1>
    <p class="subtitle">Pipeline de Clips Automático</p>

    <form action="/auth/login" method="POST">
      <div class="form-group">
        <label for="password">Senha de acesso</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" autofocus required>
      </div>
      <div id="login-error" class="error-msg" style="display:none;margin-bottom:14px">
        ⚠️ Senha incorreta. Tente novamente.
      </div>
      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('login-error').style.display = 'block';
    }
  </script>
</body>
</html>
