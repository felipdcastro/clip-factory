<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Factory</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-brand">
      <div class="header-logo">✂️</div>
      <div class="header-title-wrap">
        <span class="header-title">Clip <span>Factory</span></span>
        <span class="header-subtitle">Pipeline de Clips Automático</span>
      </div>
    </div>
    <div id="yt-status" class="yt-status" title="Status YouTube"></div>
    <form action="/auth/logout" method="POST">
      <button type="submit" class="logout-btn">Sair</button>
    </form>
  </header>

  <main>

    <!-- Painel de novo job -->
    <div class="panel mb-24">
      <div class="panel-header">
        <div class="panel-icon">＋</div>
        <span class="panel-title">Novo Job</span>
      </div>
      <div class="panel-body">

        <!-- Seletor de tipo de conteúdo -->
        <div class="content-type-wrapper">
          <div class="content-type-label">Tipo de conteúdo</div>
          <div class="content-type-tabs" id="content-type-selector">
            <button class="btn-content-type active" data-type="auto">
              <span class="ct-icon">✨</span> Auto-detectar
            </button>
            <button class="btn-content-type" data-type="batalha-de-rima">
              <span class="ct-icon">🎤</span> Batalha de Rima
            </button>
            <button class="btn-content-type" data-type="toguro">
              <span class="ct-icon">🎮</span> Toguro
            </button>
            <button class="btn-content-type" data-type="mbl">
              <span class="ct-icon">🏛️</span> MBL / Política
            </button>
            <button class="btn-content-type" data-type="comedia">
              <span class="ct-icon">😂</span> Comédia
            </button>
            <button class="btn-content-type" data-type="lol-esports">
              <span class="ct-icon">⚔️</span> LoL E-Sports
            </button>
            <button class="btn-content-type" data-type="sinuca">
              <span class="ct-icon">🎱</span> Sinuca
            </button>
          </div>
        </div>

        <!-- Campos de Summoner (apenas LoL) -->
        <div id="summoner-fields" style="display:none;margin-bottom:16px">
          <div class="input-row">
            <input
              type="text"
              id="summoner-name-input"
              placeholder="Summoner Name (opcional)"
              autocomplete="off"
              style="flex:2"
            >
            <select id="riot-region-select" style="flex:1;min-width:90px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);color:var(--text);padding:12px 14px;font-family:inherit;font-size:0.9rem;outline:none">
              <option value="BR1">BR</option>
              <option value="NA1">NA</option>
              <option value="EUW1">EUW</option>
              <option value="KR">KR</option>
              <option value="LA1">LAN</option>
              <option value="LA2">LAS</option>
            </select>
          </div>
        </div>

        <!-- URL do YouTube — hero input -->
        <form id="url-form">
          <div class="hero-input-wrap">
            <input
              type="url"
              id="url-input"
              placeholder="Cole a URL do YouTube aqui..."
              autocomplete="off"
            >
            <button type="submit" class="btn btn-primary" id="submit-btn">
              ▶ Processar
            </button>
          </div>
        </form>

        <div class="divider">ou envie um arquivo</div>

        <!-- Upload de arquivo -->
        <form id="upload-form">
          <input type="file" id="file-input" accept=".mp4,.mkv,.avi,.mov,.webm" style="display:none">
          <label class="upload-zone" id="upload-zone" for="file-input">
            <div class="upload-zone-icon">📁</div>
            <div class="upload-zone-label">Clique ou arraste o vídeo aqui</div>
            <div class="upload-zone-hint">MP4, MKV, AVI, MOV, WEBM · até 4 GB (fragmentado)</div>
          </label>
          <button type="submit" class="btn btn-primary btn-full" id="upload-btn" style="display:none">
            ↑ Enviar Vídeo
          </button>
        </form>
        <div id="upload-progress"></div>

      </div>
    </div>

    <!-- Status Bar / Pipeline -->
    <div id="status-bar" class="status-bar panel mb-24">
      <div class="status-top">
        <div class="status-label">Pipeline</div>
        <div id="status-text" class="status-message"></div>
      </div>
      <div class="progress-steps">

        <div class="step" id="step-downloading">
          <div class="step-dot">⬇</div>
          <div class="step-label">Download</div>
        </div>

        <div class="step-connector" id="conn-1"></div>

        <div class="step" id="step-transcribing">
          <div class="step-dot">🎙</div>
          <div class="step-label">Transcrição</div>
        </div>

        <div class="step-connector" id="conn-2"></div>

        <div class="step" id="step-analyzing">
          <div class="step-dot">🤖</div>
          <div class="step-label">Análise IA</div>
        </div>

        <div class="step-connector" id="conn-3"></div>

        <div class="step" id="step-analyzed">
          <div class="step-dot">✓</div>
          <div class="step-label">Pronto</div>
        </div>

      </div>
    </div>

    <!-- Painel de Custos -->
    <div class="panel mb-24" id="costs-panel">
      <div class="panel-header" style="cursor:pointer" onclick="toggleCosts()">
        <div class="panel-icon">💰</div>
        <span class="panel-title">Custos de API</span>
        <span id="costs-total-badge" class="costs-badge"></span>
        <span id="costs-chevron" style="margin-left:auto;opacity:0.5">▼</span>
      </div>
      <div id="costs-body" class="panel-body" style="display:none">
        <div id="costs-content">Carregando...</div>
      </div>
    </div>

    <!-- Jobs Recentes -->
    <div id="jobs-section" class="mb-24">
      <div class="section-header">
        <div class="section-title">Jobs recentes</div>
      </div>
      <div id="jobs-list"></div>
    </div>

    <!-- Sugestões de corte -->
    <div id="suggestions-section" style="display:none">
      <div class="section-header">
        <div class="section-title" id="suggestions-title">Sugestões de corte</div>
      </div>
      <div id="category-filters" class="category-filters" style="display:none"></div>
      <div id="suggestions-list" class="suggestions-list"></div>
    </div>

  </main>

  <!-- Modal de pré-visualização de clip -->
  <div id="preview-modal" class="preview-modal" onclick="closePreview(event)">
    <div class="preview-modal-inner">
      <button class="preview-close" onclick="closePreview()">&times;</button>
      <video id="preview-video" class="preview-video" controls playsinline></video>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
